name: Deploy Gateway

on:
  push:
    branches: [main]
    paths:
      - "k8s/**"
      - "Dockerfile"
      - "crates/**"
      - ".github/workflows/deploy-gateway.yml"
  workflow_dispatch:
    inputs:
      force_redeploy:
        description: "Force redeploy even without file changes"
        required: false
        default: "false"

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/flint-gate
  K8S_NAMESPACE: flint-gate
  CONTEXT: ssr

jobs:
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ssr cluster
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context ${{ env.CONTEXT }}

      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.K8S_NAMESPACE }} --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Apply secrets
        run: |
          kubectl create secret generic flint-gate-secrets \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --from-literal=database-url="${{ secrets.DATABASE_URL }}" \
            --from-literal=jwt-secret="${{ secrets.FLINT_GATE_JWT_SECRET }}" \
            --dry-run=client -o yaml \
            | kubectl apply -f -

      - name: Apply ConfigMap
        run: |
          kubectl apply -f k8s/configmap.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}

      - name: Update image tag in deployment and apply
        run: |
          IMAGE_TAG="${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.short_sha }}"
          kubectl set image deployment/flint-gate \
            flint-gate="${IMAGE_TAG}" \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --dry-run=client
          sed "s|flint-gate:latest|${IMAGE_TAG}|g" k8s/deployment.yaml \
            | kubectl apply -f - --namespace=${{ env.K8S_NAMESPACE }}

      - name: Apply Services, HPA, NetworkPolicy
        run: |
          kubectl apply -f k8s/service.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}
          kubectl apply -f k8s/service-admin.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}
          kubectl apply -f k8s/hpa.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}
          kubectl apply -f k8s/network-policy.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}

      - name: Apply Ingress (gate.sansabaroyalty.com)
        run: |
          kubectl apply -f k8s/ingress.yaml \
            --namespace=${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/flint-gate \
            --namespace=${{ env.K8S_NAMESPACE }} \
            --timeout=300s

      - name: Wait for TLS certificate
        run: |
          echo "Waiting for cert-manager to issue certificate..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get certificate flint-gate-tls \
              --namespace=${{ env.K8S_NAMESPACE }} \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")
            if [ "$STATUS" = "True" ]; then
              echo "Certificate issued successfully"
              break
            fi
            echo "  attempt $i/30 — certificate not ready yet, waiting 10s..."
            sleep 10
          done
          kubectl get certificate --namespace=${{ env.K8S_NAMESPACE }} || true

      - name: Smoke test
        run: |
          echo "Gateway IP: 4.249.218.170"
          echo "Checking https://gate.sansabaroyalty.com/health ..."
          # Give DNS/cert a moment if this is a first deploy
          sleep 5
          curl --fail --silent --max-time 15 \
            https://gate.sansabaroyalty.com/health || \
            echo "Warning: /health check failed — DNS may not have propagated yet"

      - name: Summary
        run: |
          echo "### Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:sha-${{ needs.build-and-push.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | \`${{ env.K8S_NAMESPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Context | \`${{ env.CONTEXT }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway | https://gate.sansabaroyalty.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway IP | 4.249.218.170 |" >> $GITHUB_STEP_SUMMARY
