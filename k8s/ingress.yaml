apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flint-gate
  namespace: flint-gate
  annotations:
    # cert-manager issues a Let's Encrypt certificate for gate.sansabaroyalty.com
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Automatic HTTP→HTTPS redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Extended timeouts for long-lived approval streams (SSE / WebSocket proxying)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  rules:
    - host: gate.sansabaroyalty.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: flint-gate
                port:
                  number: 4456
  tls:
    - hosts:
        - gate.sansabaroyalty.com
      secretName: flint-gate-tls
