apiVersion: v1
kind: Service
metadata:
  name: flint-gate
  labels:
    app: flint-gate
spec:
  type: ClusterIP
  selector:
    app: flint-gate
  ports:
    - name: proxy
      port: 4456
      targetPort: proxy
    # Admin port 4457 is intentionally omitted from the Service.
    # Access is restricted via NetworkPolicy (network-policy.yaml).
    # Use `kubectl port-forward` for local admin access:
    #   kubectl port-forward svc/flint-gate 4457:4457
