# IMPORTANT: Do NOT commit real secrets to source control.
# Generate base64 values: echo -n 'your-value' | base64
#
# Recommended: use `kubectl create secret generic` or an external secrets manager
# (e.g. External Secrets Operator, Vault, AWS Secrets Manager).
apiVersion: v1
kind: Secret
metadata:
  name: flint-gate-secrets
type: Opaque
data:
  # echo -n 'postgres://flintgate:password@postgres:5432/flintgate' | base64
  database-url: <BASE64_ENCODED_DATABASE_URL>
  # echo -n 'your-strong-jwt-secret' | base64
  jwt-secret: <BASE64_ENCODED_JWT_SECRET>
