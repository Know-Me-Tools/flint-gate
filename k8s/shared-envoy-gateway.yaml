# Shared Envoy Gateway edge for gate.sansabaroyalty.com.
#
# The Gateway itself is managed in envoy-gateway-system as
# acme-http01-gateway. Its HTTPS listener is added separately because the
# cluster already owns other listeners on the same single-IP Gateway.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gate-sansabaroyalty-com
  namespace: envoy-gateway-system
spec:
  secretName: gate-sansabaroyalty-com-tls
  privateKey:
    rotationPolicy: Always
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt-http01
  dnsNames:
    - gate.sansabaroyalty.com
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gate-http-to-https
  namespace: envoy-gateway-system
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: acme-http01-gateway
      namespace: envoy-gateway-system
      sectionName: http
  hostnames:
    - gate.sansabaroyalty.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
