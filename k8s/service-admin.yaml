apiVersion: v1
kind: Service
metadata:
  name: flint-gate-admin
  labels:
    app: flint-gate
    component: admin
spec:
  type: ClusterIP
  selector:
    app: flint-gate
  # sessionAffinity pins each admin client to one replica when running with the
  # memory approval backend (approval.backend: memory). Without this, roughly
  # 1/N decisions land on the wrong replica and return 404.
  #
  # This constraint is removed by switching to the Postgres approval backend
  # (approval.backend: postgres) — all replicas share the same durable store and
  # pg_notify wakes whichever replica holds the paused stream. In that case this
  # sessionAffinity entry can be removed or set to "None".
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours — covers typical approval review windows
  ports:
    - name: admin
      port: 4457
      targetPort: admin
