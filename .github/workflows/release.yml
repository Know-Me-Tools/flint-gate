name: Release

on:
  push:
    tags: ["v*"]

jobs:
  rust-publish:
    name: Publish Rust crates
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish workspace crates
        run: |
          for crate in crates/*/; do
            if [ -f "$crate/Cargo.toml" ]; then
              (cd "$crate" && cargo publish --token "${{ steps.auth.outputs.token }}" || true)
            fi
          done

  docker-publish:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  typescript-sdk:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    if: hashFiles('sdks/typescript/package.json') != ''
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  flutter-sdk:
    name: Publish Flutter SDK
    runs-on: ubuntu-latest
    if: hashFiles('sdks/flutter/pubspec.yaml') != ''
    defaults:
      run:
        working-directory: sdks/flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: dart format .
      - run: flutter analyze
      - run: flutter test
      - run: dart pub publish --force
        env:
          PUB_CREDENTIALS: ${{ secrets.PUB_CREDENTIALS }}

  go-sdk:
    name: Publish Go SDK
    runs-on: ubuntu-latest
    if: hashFiles('sdks/go/go.mod') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: |
          cd sdks/go && go test ./...
      - name: Tag Go module
        run: |
          git tag -f "sdks/go/${{ github.ref_name }}" 2>/dev/null || true
          git push origin "sdks/go/${{ github.ref_name }}" --force || true
